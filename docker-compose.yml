services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.example
    volumes:
      - asystqa-data:/app/backend/data
      - asystqa-audit:/app/backend/audit
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  asystqa-data:
  asystqa-audit:
  grafana-data:
